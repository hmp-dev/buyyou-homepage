<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuyYou — 인사이트 보기</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
  <meta name="theme-color" content="#1047C2" />

  <!--
    SNS 미리보기 (카톡/트위터/페북) — 인사이트 메타데이터 SSR 미지원이라
    일단 BuyYou 공통 OG 태그. 추후 OG 동적화 필요 시 Vercel Edge Function /
    Supabase Edge Function 으로 교체 (현재는 정적 fallback 우선).
  -->
  <meta property="og:title" content="BuyYou — 당신의 경험을 삽니다" />
  <meta property="og:description" content="전문가의 노하우와 경험을 1:1 미팅으로 사고파는 플랫폼. 앱에서 인사이트를 확인하세요." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://buyyou.app/images/apple-touch-icon.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #f8fafc 0%, #eef4ff 100%);
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(16, 71, 194, 0.18);
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
      color: #1047C2;
    }
    p {
      font-size: 15px;
      color: #475569;
      line-height: 1.55;
      max-width: 320px;
      margin-bottom: 28px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #cbd5e1;
      border-top-color: #1047C2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stores {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .store-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 12px;
      background: #1047C2;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 12px rgba(16, 71, 194, 0.24);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .store-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16, 71, 194, 0.32); }
    .store-btn.alt {
      background: #ffffff;
      color: #1047C2;
      border: 1.5px solid #1047C2;
      box-shadow: none;
    }
    .home-link {
      margin-top: 18px;
      font-size: 13px;
      color: #94a3b8;
      text-decoration: none;
    }
    .home-link:hover { color: #475569; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/images/apple-touch-icon.png" alt="BuyYou" class="logo" />
    <div class="spinner" id="spinner"></div>
    <h1 id="heading">앱으로 이동 중...</h1>
    <p id="subheading">잠시만 기다려주세요. 자동으로 BuyYou 앱이 열려요.</p>

    <div class="stores" id="stores" style="display: none;">
      <a href="https://apps.apple.com/kr/app/buyyou/id6761962820" class="store-btn" id="ios-btn" style="display: none;">App Store에서 받기</a>
      <a href="https://play.google.com/store/apps/details?id=com.buyyou.app" class="store-btn" id="android-btn" style="display: none;">Google Play에서 받기</a>
    </div>

    <a href="/" class="home-link" id="home-link" style="display: none;">BuyYou 홈페이지로 이동</a>
  </div>

  <!--
    동작 흐름:
    1. iOS / Android 단말은 Universal Links / App Links 가 정상 작동하면 OS 가
       먼저 앱을 가로채 이 페이지에 도달하지 않음. 도달했다는 건 (a) 앱 미설치
       또는 (b) Universal Links 검증 실패 (cold start race / 도메인 검증 진행 중)
       또는 (c) 카톡 같은 in-app 브라우저가 가로챔.
    2. (a)/(b) 케이스: 잠시 후 적절한 스토어로 redirect.
    3. (c) 카톡 in-app 브라우저: redirect 후에도 in-app 브라우저 컨텍스트에 머물 수 있어,
       "외부 브라우저에서 열기" 안내 + 스토어 버튼 명시 노출이 안전망 역할.
    4. 데스크톱: 홈페이지로 redirect (스토어 redirect 는 의미 없음).

    OS 감지는 User-Agent 단순 매칭. 카톡 in-app 브라우저도 iOS/Android UA 를
    그대로 들고 있어서 같은 분기로 처리되며, redirect 가 실패해도 fallback 버튼이
    노출되어 사용자가 명시적으로 탭할 수 있다.
  -->
  <script>
    (function () {
      var ua = (navigator.userAgent || '').toLowerCase();
      var isIOS = /iphone|ipad|ipod/.test(ua);
      var isAndroid = /android/.test(ua);
      var IOS_STORE = 'https://apps.apple.com/kr/app/buyyou/id6761962820';
      var ANDROID_STORE = 'https://play.google.com/store/apps/details?id=com.buyyou.app';
      var HOME = 'https://buyyou.app/';

      function showFallback(target) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('heading').textContent = '앱이 설치되어 있지 않나요?';
        document.getElementById('subheading').textContent =
          'BuyYou 앱을 설치하면 인사이트를 바로 확인할 수 있어요.';
        document.getElementById('stores').style.display = 'flex';
        if (target === 'ios') {
          document.getElementById('ios-btn').style.display = 'inline-flex';
        } else if (target === 'android') {
          document.getElementById('android-btn').style.display = 'inline-flex';
        }
        document.getElementById('home-link').style.display = 'inline-block';
      }

      function showDesktopFallback() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('heading').textContent = '모바일에서 열어주세요';
        document.getElementById('subheading').textContent =
          'BuyYou 는 iOS / Android 모바일 앱입니다. 휴대폰에서 이 링크를 열어주세요.';
        document.getElementById('stores').style.display = 'flex';
        document.getElementById('ios-btn').style.display = 'inline-flex';
        document.getElementById('android-btn').style.display = 'inline-flex';
        document.getElementById('home-link').style.display = 'inline-block';
      }

      if (isIOS) {
        // iOS: Universal Links 가 작동했다면 OS 가 이미 가로챘을 것. 1.2초 후에도
        // 여기 머물러 있다면 미설치이거나 검증 실패 → App Store 자동 redirect.
        setTimeout(function () {
          // 페이지가 여전히 visible 이면 redirect. background 로 갔다면 (= 앱이
          // 가로챘다면) redirect 발생해도 사용자에게 보이지 않음 — 안전.
          window.location.replace(IOS_STORE);
        }, 1200);
        // 추가 안전망: 3초 뒤에도 페이지 살아있으면 fallback UI.
        setTimeout(function () {
          if (!document.hidden) showFallback('ios');
        }, 3000);
      } else if (isAndroid) {
        setTimeout(function () {
          window.location.replace(ANDROID_STORE);
        }, 1200);
        setTimeout(function () {
          if (!document.hidden) showFallback('android');
        }, 3000);
      } else {
        // 데스크톱 — redirect 하지 않고 명시적 안내. 즉시 fallback UI.
        showDesktopFallback();
      }
    })();
  </script>
</body>
</html>
